<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vayu | Dictation Dashboard</title>
<style>
  :root {
    --bg-gradient: linear-gradient(135deg, #dff4ff 0%, #f7fbff 48%, #e8f8ef 100%);
    --panel-bg: rgba(255, 255, 255, 0.68);
    --panel-strong: rgba(255, 255, 255, 0.82);
    --ink: #43526a;
    --ink-strong: #26364f;
    --text-main: #34435a;
    --text-muted: #7b8ca3;
    --accent-primary: #58b8f6;
    --accent-secondary: #49c88f;
    --accent-warm: #f5b84b;
    --accent-rose: #ee7a8d;
    --play-blue: #3c79cf;
    --play-green: #a9cd3c;
    --line-soft: rgba(95, 124, 158, 0.2);
    --card-shadow: 0 18px 48px rgba(72, 105, 134, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.78);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-gradient);
    background-image:
      linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(225, 243, 255, 0.34)),
      url("assets/vayu-floating-islands.png");
    background-size: cover;
    background-position: center;
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    display: flex;
    position: relative;
  }

  .ambient-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
  }

  /* Sidebar styling */
  aside {
    width: 230px;
    background: rgba(255, 255, 255, 0.45);
    border-right: 1px solid rgba(255, 255, 255, 0.62);
    backdrop-filter: blur(24px);
    display: flex;
    flex-direction: column;
    padding: 24px;
    z-index: 2;
    contain: layout paint style;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }

  .brand svg {
    width: 24px;
    height: 24px;
    fill: var(--accent-primary);
  }

  .brand-name {
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #50627d 20%, #58b8f6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .nav-btn {
    background: rgba(255, 255, 255, 0.38);
    border: 1px solid rgba(255, 255, 255, 0.5);
    color: var(--text-muted);
    padding: 12px 16px;
    border-radius: 8px;
    text-align: left;
    font-size: 0.95rem;
    font-weight: 800;
    cursor: pointer;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 18px rgba(72, 105, 134, 0.1);
    transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
  }

  .nav-btn:hover {
    background: rgba(255, 255, 255, 0.72);
    color: var(--ink-strong);
    transform: translateX(2px);
  }

  .nav-btn.active {
    background: var(--play-blue);
    color: #ffffff;
    border-color: rgba(255, 255, 255, 0.52);
    box-shadow: 0 12px 22px rgba(60, 121, 207, 0.28), inset 0 -3px 0 rgba(40, 86, 156, 0.35);
  }

  .nav-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }

  /* Main Workspace Container */
  main {
    flex: 1;
    padding: 28px 32px 36px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
    position: relative;
    z-index: 1;
  }

  .sky-hero {
    min-height: 310px;
    display: grid;
    grid-template-columns: minmax(360px, 0.92fr) minmax(260px, 0.58fr);
    gap: 24px;
    align-items: center;
  }

  .hero-console {
    min-width: 0;
    padding: 34px 38px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.64);
    border: 1px solid rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(22px);
    box-shadow: var(--card-shadow);
    display: grid;
    gap: 22px;
    contain: layout paint style;
    isolation: isolate;
  }

  .hero-brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  .hero-brand img {
    width: 58px;
    height: 58px;
    object-fit: contain;
  }

  .hero-title {
    color: #5f6f86;
    font-size: clamp(2rem, 4vw, 3.05rem);
    font-weight: 300;
    letter-spacing: 0.28em;
  }

  .hero-search {
    position: relative;
  }

  .hero-search svg {
    position: absolute;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    fill: #637894;
  }

  .hero-search .search-input {
    height: 70px;
    padding-left: 72px;
    padding-right: 24px;
    font-size: 1.25rem;
    font-weight: 650;
    color: var(--ink-strong);
    background: rgba(255, 255, 255, 0.66);
    border-color: rgba(90, 118, 150, 0.18);
    box-shadow: inset 0 2px 6px rgba(90, 118, 150, 0.08), 0 12px 24px rgba(72, 105, 134, 0.1);
  }

  .hero-subcopy {
    text-align: center;
    color: #71849c;
    font-size: 1.02rem;
    font-weight: 650;
  }

  .hero-actions {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .hero-button {
    border: 1px solid rgba(255, 255, 255, 0.58);
    border-radius: 8px;
    min-width: 150px;
    height: 50px;
    padding: 0 18px;
    background: rgba(255, 255, 255, 0.46);
    color: #5f7189;
    font-size: 0.95rem;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 12px 22px rgba(72, 105, 134, 0.12);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .hero-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 26px rgba(72, 105, 134, 0.16);
  }

  .hero-button.primary {
    background: var(--play-green);
    color: #ffffff;
    box-shadow: 0 13px 24px rgba(121, 151, 38, 0.24), inset 0 -4px 0 rgba(91, 121, 21, 0.24);
  }

  .quest-panel {
    align-self: stretch;
    padding: 24px;
    border-radius: 8px;
    border: 2px solid rgba(126, 170, 54, 0.55);
    background: rgba(18, 42, 78, 0.66);
    color: #ffffff;
    backdrop-filter: blur(18px);
    box-shadow: 0 20px 42px rgba(21, 55, 93, 0.22);
    display: grid;
    gap: 18px;
    contain: layout paint style;
    isolation: isolate;
  }

  .quest-title {
    color: #eff7ff;
    font-size: 1.15rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 2px dashed rgba(169, 205, 60, 0.72);
    padding-bottom: 12px;
  }

  .quest-row {
    display: grid;
    grid-template-columns: 74px 1fr;
    gap: 14px;
    align-items: center;
  }

  .quest-number {
    font-size: 2.05rem;
    font-weight: 900;
    color: #ffffff;
  }

  .quest-label {
    color: #c8ee6a;
    font-size: 0.78rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .fable-dock {
    align-self: center;
    display: flex;
    align-items: end;
    gap: 9px;
    min-height: 72px;
    padding: 9px 12px;
    border: 1px solid rgba(255, 255, 255, 0.72);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.48);
    backdrop-filter: blur(18px);
    box-shadow: 0 16px 34px rgba(72, 105, 134, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.76);
    contain: layout paint style;
    isolation: isolate;
  }

  .dock-button {
    --size: 48px;
    width: var(--size);
    height: var(--size);
    border: 1px solid rgba(255, 255, 255, 0.74);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(221, 237, 249, 0.7));
    color: #57718f;
    display: grid;
    place-items: center;
    cursor: pointer;
    box-shadow: 0 10px 18px rgba(72, 105, 134, 0.14), inset 0 -3px 0 rgba(70, 111, 152, 0.08);
    transition: width 0.08s ease, height 0.08s ease, transform 0.14s ease, color 0.14s ease;
  }

  .dock-button:hover,
  .dock-button:focus-visible {
    color: #2f6fbf;
    transform: translateY(-4px);
    outline: none;
  }

  .dock-button svg {
    width: 54%;
    height: 54%;
    fill: currentColor;
  }

  .command-strip {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .latest-panel,
  .pulse-card {
    background: var(--panel-bg);
    border: 1px solid rgba(255, 255, 255, 0.64);
    border-radius: 8px;
    backdrop-filter: blur(18px);
    box-shadow: var(--card-shadow);
    contain: layout paint style;
    isolation: isolate;
  }

  .latest-panel {
    min-width: 0;
    padding: 18px;
    display: grid;
    gap: 12px;
  }

  .panel-kicker,
  .pulse-label {
    color: #6f8199;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .latest-text {
    min-height: 48px;
    color: var(--text-main);
    font-size: 1.05rem;
    line-height: 1.45;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .latest-meta {
    color: var(--text-muted);
    font-size: 0.82rem;
  }

  .panel-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .action-btn,
  .copy-btn {
    border: 1px solid rgba(73, 109, 147, 0.14);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.58);
    color: #526780;
    height: 32px;
    padding: 0 12px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
  }

  .action-btn:hover,
  .copy-btn:hover {
    transform: translateY(-1px);
    border-color: rgba(60, 121, 207, 0.25);
    background: rgba(255, 255, 255, 0.82);
  }

  .action-btn.primary {
    background: var(--play-blue);
    border-color: rgba(255, 255, 255, 0.54);
    color: #ffffff;
    box-shadow: inset 0 -3px 0 rgba(40, 86, 156, 0.3);
  }

  .pulse-card {
    padding: 16px;
    display: grid;
    align-content: space-between;
    min-height: 132px;
    position: relative;
    overflow: hidden;
    border-top: 2px solid var(--accent-primary);
  }

  .pulse-card:nth-child(3) {
    border-top-color: var(--accent-warm);
  }

  .pulse-card:nth-child(4) {
    border-top-color: var(--accent-rose);
  }

  .pulse-value {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .pulse-note {
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  .view-panel {
    display: none;
    flex-direction: column;
    gap: 24px;
  }

  .view-panel.active {
    display: flex;
  }

  h2 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--ink-strong);
  }

  /* Search & Filter Bar */
  .search-row {
    display: flex;
    gap: 16px;
    align-items: center;
    width: 100%;
  }

  .search-input-wrapper {
    position: relative;
    flex: 1;
  }

  .search-input-wrapper svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    fill: var(--text-muted);
  }

  .search-input {
    width: 100%;
    background: rgba(255, 255, 255, 0.62);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 12px 12px 12px 42px;
    color: var(--ink-strong);
    outline: none;
    font-size: 0.95rem;
    transition: all 0.2s ease;
  }

  .search-input:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 12px rgba(93, 211, 255, 0.16);
  }

  /* Horizontal Tag Filter Row */
  .tag-filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: thin;
  }

  .tag-filters::-webkit-scrollbar {
    height: 4px;
  }

  .tag-filters::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 2px;
  }

  .filter-tag-badge {
    background: rgba(255, 255, 255, 0.56);
    border: 1px solid rgba(255, 255, 255, 0.66);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s ease;
  }

  .filter-tag-badge:hover {
    background: rgba(255, 255, 255, 0.82);
    color: var(--ink-strong);
  }

  .filter-tag-badge.active {
    background: var(--play-blue);
    border-color: rgba(255, 255, 255, 0.72);
    color: #ffffff;
  }

  /* Transcripts List/Feed */
  .feed-container {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .transcript-card {
    background: var(--panel-bg);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.66);
    border-radius: 8px;
    padding: 20px;
    box-shadow: var(--card-shadow);
    transition: all 0.25s ease;
    contain: layout paint style;
    isolation: isolate;
  }

  .transcript-card:hover {
    border-color: rgba(60, 121, 207, 0.25);
    transform: translateY(-2px);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .copy-btn {
    height: 28px;
    font-size: 0.76rem;
    padding: 0 10px;
  }

  .card-date {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  .card-text {
    font-size: 1.05rem;
    line-height: 1.5;
    color: var(--text-main);
    margin-bottom: 14px;
    word-wrap: break-word;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag-badge {
    background: rgba(60, 121, 207, 0.1);
    border: 1px solid rgba(60, 121, 207, 0.2);
    color: #2f6fbf;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  /* Metrics Grid */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .metric-card {
    background: var(--panel-bg);
    border: 1px solid rgba(255, 255, 255, 0.66);
    border-radius: 8px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: var(--card-shadow);
    contain: layout paint style;
    isolation: isolate;
  }

  .metric-label {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .metric-value {
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--text-main);
  }

  /* Stats Visualizer Layout */
  .stats-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .stats-section-card {
    background: var(--panel-bg);
    border: 1px solid rgba(255, 255, 255, 0.66);
    border-radius: 8px;
    padding: 24px;
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: column;
    gap: 16px;
    contain: layout paint style;
    isolation: isolate;
  }

  .stats-section-title {
    font-size: 1.1rem;
    font-weight: 700;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    padding-bottom: 10px;
  }

  /* Custom Bar Chart */
  .chart-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 300px;
    overflow-y: auto;
    padding-right: 6px;
  }

  .chart-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chart-label {
    width: 90px;
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chart-bar-bg {
    flex: 1;
    height: 8px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 4px;
    overflow: hidden;
  }

  .chart-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-secondary) 0%, var(--accent-primary) 100%);
    border-radius: 4px;
    width: 0%;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .chart-count {
    width: 30px;
    font-size: 0.85rem;
    color: var(--text-main);
    font-weight: 700;
    text-align: right;
  }

  /* Tag Combination Matrix list */
  .combo-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 300px;
    overflow-y: auto;
    padding-right: 6px;
  }

  .combo-item {
    background: rgba(255, 255, 255, 0.52);
    border: 1px solid rgba(255, 255, 255, 0.62);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .combo-pair {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .combo-plus {
    color: var(--text-muted);
    font-weight: 700;
    font-size: 0.85rem;
  }

  .combo-count {
    background: rgba(48, 220, 164, 0.18);
    border: 1px solid rgba(48, 220, 164, 0.25);
    color: #bff9e5;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 700;
  }

  @media (max-width: 980px) {
    body {
      overflow: auto;
      min-height: 100vh;
    }

    aside {
      display: none;
    }

    main {
      overflow: visible;
    }

    .sky-hero,
    .command-strip,
    .stats-split {
      grid-template-columns: 1fr;
    }

    .metrics-grid {
      grid-template-columns: 1fr;
    }

    .fable-dock {
      position: sticky;
      bottom: 12px;
    }
  }
</style>
</head>
<body>
<canvas id="ambientCanvas" class="ambient-canvas" aria-hidden="true"></canvas>

<aside>
  <div class="brand">
    <img src="assets/vayu_transparent.png" alt="Vayu Logo" style="width: 28px; height: 28px; object-fit: contain;">
    <div class="brand-name">VAYU</div>
  </div>
  
  <button id="navFeed" class="nav-btn active">
    <svg viewBox="0 0 24 24"><path d="M4 14h6v-4H4v4zm0 5h6v-4H4v4zM4 9h6V5H4v4zm10 10h6v-4h-6v4zm0-9v4h6v-4h-6zm0-5v4h6V5h-6z"/></svg>
    Transcripts Feed
  </button>
  
  <button id="navStats" class="nav-btn">
    <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
    Tag Statistics
  </button>
</aside>

<main>
  <section class="sky-hero">
    <div class="hero-console">
      <div class="hero-brand">
        <img src="assets/vayu_transparent.png" alt="Vayu Logo">
        <div class="hero-title">VAYU</div>
      </div>
      <div class="hero-search">
        <svg viewBox="0 0 24 24">
          <path d="M9.5 3a6.5 6.5 0 0 1 5.18 10.43l.27.28h.79l4.99 5-1.49 1.48-5-4.99v-.79l-.28-.27A6.5 6.5 0 1 1 9.5 3zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9z"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search your transcripts...">
      </div>
      <div class="hero-actions">
        <button id="heroHistoryBtn" class="hero-button primary">History</button>
        <button id="heroInsightsBtn" class="hero-button">Insights</button>
      </div>
    </div>

    <div class="quest-panel">
      <div class="quest-title">Dictation Story</div>
      <div class="quest-row">
        <div id="pulseBackups" class="quest-number">0</div>
        <div class="quest-label">Local backups</div>
      </div>
      <div class="quest-row">
        <div id="pulseToday" class="quest-number">0</div>
        <div class="quest-label">Captured today</div>
      </div>
      <div class="quest-row">
        <div id="pulseWords" class="quest-number">0</div>
        <div class="quest-label">Searchable words</div>
      </div>
    </div>
  </section>

  <nav id="quickDock" class="fable-dock" aria-label="Quick actions">
    <button class="dock-button" data-action="history" title="History" aria-label="History">
      <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 1 1-8.54 6.15l-1.6-.92A11 11 0 1 0 13 1v2zm-1 3h2v6.1l4 2.3-1 1.73-5-2.88V6zM4 3v5h5V6H6.72A9.03 9.03 0 0 1 13 3V1A10.98 10.98 0 0 0 4.7 4.23L4 3z"/></svg>
    </button>
    <button class="dock-button" data-action="copy" title="Copy latest" aria-label="Copy latest">
      <svg viewBox="0 0 24 24"><path d="M7 7V3h14v14h-4v4H3V7h4zm2 0h8v8h2V5H9v2zm-4 2v10h10V9H5z"/></svg>
    </button>
    <button class="dock-button" data-action="refresh" title="Refresh" aria-label="Refresh">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.75 10h-2.1A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h8V3l-3.35 3.35z"/></svg>
    </button>
    <button class="dock-button" data-action="insights" title="Insights" aria-label="Insights">
      <svg viewBox="0 0 24 24"><path d="M5 9.2h3V21H5V9.2zm5.5-6.2h3v18h-3V3zM16 13h3v8h-3v-8zm-12 8h17v2H4v-2z"/></svg>
    </button>
  </nav>

  <section class="command-strip">
    <div class="latest-panel">
      <div class="panel-kicker">Latest Capture</div>
      <div id="latestText" class="latest-text">No dictations yet.</div>
      <div id="latestMeta" class="latest-meta">Waiting for a local transcript.</div>
      <div class="panel-actions">
        <button id="copyLatestBtn" class="action-btn primary">Copy Latest</button>
        <button id="refreshBtn" class="action-btn">Refresh</button>
      </div>
    </div>
  </section>

  <!-- TAB 1: Transcripts Feed -->
  <div id="panelFeed" class="view-panel active">
    <h2>Dictation Transcripts</h2>

    <!-- Active Filter Tags -->
    <div id="tagFilterRow" class="tag-filters">
      <!-- Generated via JS -->
    </div>

    <div id="feedList" class="feed-container">
      <!-- Generated via JS -->
    </div>
  </div>

  <!-- TAB 2: Tag Statistics -->
  <div id="panelStats" class="view-panel">
    <h2>Tag Insights Dashboard</h2>
    
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Total Dictations</div>
        <div id="metricTotalDictations" class="metric-value">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Total Tags Logged</div>
        <div id="metricTotalTags" class="metric-value">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Unique Combinations</div>
        <div id="metricUniqueCombos" class="metric-value">0</div>
      </div>
    </div>

    <div class="stats-split">
      <!-- Tag Frequency Chart -->
      <div class="stats-section-card">
        <div class="stats-section-title">Tag Frequency</div>
        <div id="tagChart" class="chart-container">
          <!-- Bars generated via JS -->
        </div>
      </div>

      <!-- Tag Combinations Stats List -->
      <div class="stats-section-card">
        <div class="stats-section-title">Co-occurrence Tag Combinations</div>
        <div id="comboList" class="combo-list">
          <!-- Combinations list generated via JS -->
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  // Core Node.js bindings
  const { clipboard } = require('electron');
  const db = require('./db.js');

  // Elements
  const navFeed = document.getElementById('navFeed');
  const navStats = document.getElementById('navStats');
  const panelFeed = document.getElementById('panelFeed');
  const panelStats = document.getElementById('panelStats');
  const ambientCanvas = document.getElementById('ambientCanvas');
  const quickDock = document.getElementById('quickDock');
  const heroHistoryBtn = document.getElementById('heroHistoryBtn');
  const heroInsightsBtn = document.getElementById('heroInsightsBtn');
  const latestText = document.getElementById('latestText');
  const latestMeta = document.getElementById('latestMeta');
  const copyLatestBtn = document.getElementById('copyLatestBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const pulseBackups = document.getElementById('pulseBackups');
  const pulseToday = document.getElementById('pulseToday');
  const pulseWords = document.getElementById('pulseWords');
  
  const searchInput = document.getElementById('searchInput');
  const tagFilterRow = document.getElementById('tagFilterRow');
  const feedList = document.getElementById('feedList');

  const metricTotalDictations = document.getElementById('metricTotalDictations');
  const metricTotalTags = document.getElementById('metricTotalTags');
  const metricUniqueCombos = document.getElementById('metricUniqueCombos');
  const tagChart = document.getElementById('tagChart');
  const comboList = document.getElementById('comboList');

  // Application Data State
  let allTranscripts = [];
  let activeTagFilter = null;
  let currentFiltered = [];

  // 1. Navigation Panel Toggles
  navFeed.addEventListener('click', () => {
    showFeed();
  });

  heroHistoryBtn.addEventListener('click', () => {
    showFeed();
  });

  function showFeed() {
    navFeed.classList.add('active');
    navStats.classList.remove('active');
    panelFeed.classList.add('active');
    panelStats.classList.remove('active');
    renderFeed();
  }

  navStats.addEventListener('click', () => {
    showStats();
  });

  heroInsightsBtn.addEventListener('click', () => {
    showStats();
  });

  function showStats() {
    navFeed.classList.remove('active');
    navStats.classList.add('active');
    panelFeed.classList.remove('active');
    panelStats.classList.add('active');
    calculateStats();
  }

  window.addEventListener('keydown', (event) => {
    if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'k') {
      event.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
  });

  quickDock.addEventListener('mousemove', (event) => {
    const baseSize = 48;
    const maxSize = 66;
    const range = 150;
    quickDock.querySelectorAll('.dock-button').forEach(button => {
      const rect = button.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const distance = Math.abs(event.clientX - centerX);
      let size = baseSize;
      if (distance < range) {
        const factor = (Math.cos((distance / range) * Math.PI) + 1) / 2;
        size = baseSize + (maxSize - baseSize) * factor;
      }
      button.style.setProperty('--size', `${size.toFixed(1)}px`);
    });
  });

  quickDock.addEventListener('mouseleave', () => {
    quickDock.querySelectorAll('.dock-button').forEach(button => {
      button.style.setProperty('--size', '48px');
    });
  });

  quickDock.addEventListener('click', (event) => {
    const button = event.target.closest('.dock-button');
    if (!button) return;

    const action = button.dataset.action;
    if (action === 'history') {
      showFeed();
    } else if (action === 'copy') {
      copyLatestBtn.click();
    } else if (action === 'refresh') {
      refreshBtn.click();
    } else if (action === 'insights') {
      showStats();
    }
  });

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
  let ambientFrame = null;
  let windStrokes = [];
  let glassRects = [];

  function collectGlassRects() {
    const selectors = [
      '.hero-console',
      '.quest-panel',
      '.latest-panel',
      '.transcript-card',
      '.metric-card',
      '.stats-section-card',
      '.fable-dock'
    ];

    glassRects = selectors.flatMap(selector => {
      return Array.from(document.querySelectorAll(selector)).map(element => {
        const rect = element.getBoundingClientRect();
        return {
          left: rect.left - 24,
          right: rect.right + 24,
          top: rect.top - 24,
          bottom: rect.bottom + 24
        };
      });
    });
  }

  function isBehindGlass(x, y) {
    return glassRects.some(rect => (
      x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom
    ));
  }

  function resizeAmbientCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const width = window.innerWidth;
    const height = window.innerHeight;

    ambientCanvas.width = Math.floor(width * dpr);
    ambientCanvas.height = Math.floor(height * dpr);
    ambientCanvas.style.width = `${width}px`;
    ambientCanvas.style.height = `${height}px`;

    const ctx = ambientCanvas.getContext('2d');
    if (ctx) {
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    windStrokes = Array.from({ length: 24 }, (_, index) => ({
      baseX: (index * 173) % (width + 260),
      baseY: 42 + ((index * 89) % Math.max(height - 84, 1)),
      length: 92 + ((index * 37) % 96),
      amp: 10 + ((index * 11) % 22),
      speed: 0.012 + (index % 5) * 0.004,
      alpha: 0.12 + (index % 4) * 0.025
    }));
    collectGlassRects();
  }

  function drawAmbient(time) {
    const ctx = ambientCanvas.getContext('2d');
    if (!ctx || reduceMotion.matches || document.hidden) {
      ambientFrame = null;
      return;
    }

    const width = window.innerWidth;
    const height = window.innerHeight;
    ctx.clearRect(0, 0, width, height);
    collectGlassRects();

    windStrokes.forEach((stroke, index) => {
      const travel = (time * stroke.speed + stroke.baseX) % (width + 280);
      const x = travel - 140;
      const y = stroke.baseY + Math.sin(time * 0.001 + index) * stroke.amp;
      const midX = x + stroke.length * 0.5;

      if (isBehindGlass(x, y) || isBehindGlass(midX, y) || isBehindGlass(x + stroke.length, y)) {
        return;
      }

      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.bezierCurveTo(
        x + stroke.length * 0.28,
        y - stroke.amp,
        x + stroke.length * 0.72,
        y + stroke.amp,
        x + stroke.length,
        y
      );
      ctx.lineWidth = 1.2;
      ctx.lineCap = 'round';
      ctx.strokeStyle = `rgba(54, 126, 193, ${stroke.alpha})`;
      ctx.stroke();
    });

    ambientFrame = requestAnimationFrame(drawAmbient);
  }

  function startAmbient() {
    if (reduceMotion.matches) return;
    resizeAmbientCanvas();
    if (ambientFrame === null) {
      ambientFrame = requestAnimationFrame(drawAmbient);
    }
  }

  window.addEventListener('resize', resizeAmbientCanvas);
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && ambientFrame !== null) {
      cancelAnimationFrame(ambientFrame);
      ambientFrame = null;
    } else {
      startAmbient();
    }
  });

  // 2. Fetch Data & Build UI
  function loadData() {
    allTranscripts = db.getAllTranscripts();
    renderSummary();
    renderFilters();
    renderFeed();
  }

  function wordCount(text) {
    const clean = String(text || '').trim();
    return clean ? clean.split(/\s+/).length : 0;
  }

  function formatDate(value) {
    const date = new Date(value);
    return Number.isNaN(date.getTime()) ? 'Unknown time' : date.toLocaleString();
  }

  function renderSummary() {
    const latest = allTranscripts[0];
    const todayKey = new Date().toDateString();
    const todayCount = allTranscripts.filter(t => new Date(t.timestamp).toDateString() === todayKey).length;
    const totalWords = allTranscripts.reduce((sum, t) => sum + wordCount(t.text), 0);

    pulseBackups.textContent = allTranscripts.length;
    pulseToday.textContent = todayCount;
    pulseWords.textContent = totalWords;

    if (!latest) {
      latestText.textContent = 'No dictations yet.';
      latestMeta.textContent = 'Waiting for a local transcript.';
      copyLatestBtn.disabled = true;
      return;
    }

    latestText.textContent = latest.text || '';
    latestMeta.textContent = `${formatDate(latest.timestamp)} · ${wordCount(latest.text)} words`;
    copyLatestBtn.disabled = false;
  }

  function renderFilters() {
    // Collect all unique tags and sort
    const tags = new Set();
    allTranscripts.forEach(t => {
      if (t.tags) t.tags.forEach(tag => tags.add(tag));
    });
    const sortedTags = Array.from(tags).sort();

    let html = `<div class="filter-tag-badge ${activeTagFilter === null ? 'active' : ''}" onclick="toggleTagFilter(null)">All</div>`;
    sortedTags.forEach(tag => {
      html += `<div class="filter-tag-badge ${activeTagFilter === tag ? 'active' : ''}" onclick='toggleTagFilter(${JSON.stringify(tag)})'>${escapeHtml(tag)}</div>`;
    });
    tagFilterRow.innerHTML = html;
  }

  window.toggleTagFilter = function(tag) {
    activeTagFilter = tag;
    renderFilters();
    renderFeed();
  };

  function renderFeed() {
    const searchVal = searchInput.value.toLowerCase();
    
    // Filter transcripts
    currentFiltered = allTranscripts.filter(t => {
      const text = t.text || '';
      const matchSearch = text.toLowerCase().includes(searchVal);
      const matchTag = activeTagFilter === null || (t.tags && t.tags.includes(activeTagFilter));
      return matchSearch && matchTag;
    });

    if (currentFiltered.length === 0) {
      feedList.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-muted);">No matching captures.</div>`;
      return;
    }

    let html = "";
    currentFiltered.forEach(t => {
      const dateStr = formatDate(t.timestamp);
      let tagHtml = "";
      if (t.tags) {
        t.tags.forEach(tag => {
          tagHtml += `<span class="tag-badge">${escapeHtml(tag)}</span>`;
        });
      }
      
      html += `
        <div class="transcript-card">
          <div class="card-header">
            <div class="card-date">${dateStr}</div>
            <div class="card-actions">
              <button class="copy-btn" data-file="${escapeHtml(t._file || '')}">Copy</button>
            </div>
          </div>
          <div class="card-text">${escapeHtml(t.text)}</div>
          <div class="card-tags">${tagHtml}</div>
        </div>
      `;
    });
    feedList.innerHTML = html;
  }

  searchInput.addEventListener('input', renderFeed);

  feedList.addEventListener('click', (event) => {
    const button = event.target.closest('.copy-btn');
    if (!button) return;

    const transcript = allTranscripts.find(t => t._file === button.dataset.file);
    if (!transcript) return;

    clipboard.writeText(transcript.text || '');
    button.textContent = 'Copied';
    setTimeout(() => {
      button.textContent = 'Copy';
    }, 900);
  });

  copyLatestBtn.addEventListener('click', () => {
    const latest = allTranscripts[0];
    if (!latest) return;

    clipboard.writeText(latest.text || '');
    copyLatestBtn.textContent = 'Copied';
    setTimeout(() => {
      copyLatestBtn.textContent = 'Copy Latest';
    }, 900);
  });

  refreshBtn.addEventListener('click', () => {
    loadData();
    refreshBtn.textContent = 'Refreshed';
    setTimeout(() => {
      refreshBtn.textContent = 'Refresh';
    }, 900);
  });

  // 3. Stats Calculation Engine
  function calculateStats() {
    metricTotalDictations.textContent = allTranscripts.length;

    const tagCounts = {};
    const comboCounts = {};
    let totalTagLogs = 0;

    allTranscripts.forEach(t => {
      const currentTags = t.tags || [];
      totalTagLogs += currentTags.length;
      
      // Calculate single tag frequencies
      currentTags.forEach(tag => {
        tagCounts[tag] = (tagCounts[tag] || 0) + 1;
      });

      // Calculate co-occurring tag combinations (combinations of pairs)
      if (currentTags.length > 1) {
        for (let i = 0; i < currentTags.length; i++) {
          for (let j = i + 1; j < currentTags.length; j++) {
            // Sort keys so pair [A, B] and [B, A] are grouped identically
            const pair = [currentTags[i], currentTags[j]].sort();
            const pairKey = pair.join(' + ');
            comboCounts[pairKey] = (comboCounts[pairKey] || 0) + 1;
          }
        }
      }
    });

    metricTotalTags.textContent = totalTagLogs;
    metricUniqueCombos.textContent = Object.keys(comboCounts).length;

    // A. Render Frequency Chart
    const sortedTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
    const maxTagCount = sortedTags.length > 0 ? sortedTags[0][1] : 1;

    let chartHtml = "";
    if (sortedTags.length === 0) {
      chartHtml = `<div style="text-align:center; padding:20px; color:var(--text-muted);">No tag statistics yet.</div>`;
    } else {
      sortedTags.forEach(([tag, count]) => {
        const pct = (count / maxTagCount) * 100;
        chartHtml += `
          <div class="chart-row">
            <div class="chart-label" title="${tag}">${tag}</div>
            <div class="chart-bar-bg">
              <div class="chart-bar-fill" style="width: ${pct}%"></div>
            </div>
            <div class="chart-count">${count}</div>
          </div>
        `;
      });
    }
    tagChart.innerHTML = chartHtml;

    // B. Render Combo Lists
    const sortedCombos = Object.entries(comboCounts).sort((a, b) => b[1] - a[1]);
    let comboHtml = "";
    if (sortedCombos.length === 0) {
      comboHtml = `<div style="text-align:center; padding:20px; color:var(--text-muted);">No tag combinations yet. Need multiple tags in transcripts.</div>`;
    } else {
      sortedCombos.forEach(([pairKey, count]) => {
        const parts = pairKey.split(' + ');
        comboHtml += `
          <div class="combo-item">
            <div class="combo-pair">
              <span class="tag-badge" style="margin:0;">${parts[0]}</span>
              <span class="combo-plus">+</span>
              <span class="tag-badge" style="margin:0;">${parts[1]}</span>
            </div>
            <div class="combo-count">${count} co-occurrences</div>
          </div>
        `;
      });
    }
    comboList.innerHTML = comboHtml;
  }

  // Escape HTML helper
  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  // Load on start
  window.onload = () => {
    loadData();
    startAmbient();
  };
</script>
</body>
</html>
